server.port=8082

spring.application.name=booking
spring.datasource.url=jdbc:h2:mem:bookingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration/booking

spring.h2.console.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

reservation.security.jwt.secret=${JWT_SECRET:local-development-secret-change-me}
reservation.security.jwt.issuer=${JWT_ISSUER:reservation-auth}
reservation.security.jwt.expiration=${JWT_EXPIRATION:PT2H}
