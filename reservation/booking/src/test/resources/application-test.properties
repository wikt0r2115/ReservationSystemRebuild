spring.datasource.url=jdbc:h2:mem:booking-testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

reservation.security.jwt.secret=test-secret
reservation.security.jwt.issuer=reservation-auth-test
reservation.security.jwt.expiration=PT1H
