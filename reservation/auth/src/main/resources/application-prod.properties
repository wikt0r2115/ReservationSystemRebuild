spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.table=auth_flyway_schema_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.sql.init.mode=never

spring.h2.console.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

reservation.security.jwt.secret=${JWT_SECRET}
reservation.security.jwt.issuer=${JWT_ISSUER:reservation-auth}
reservation.security.jwt.expiration=${JWT_EXPIRATION:PT2H}

reservation.auth.admin.seed.enabled=${AUTH_ADMIN_SEED_ENABLED:false}
reservation.auth.admin.seed.password=${AUTH_ADMIN_PASSWORD:}
