server.port=8083

spring.application.name=auth
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

reservation.security.jwt.secret=${JWT_SECRET:local-development-secret-change-me}
reservation.security.jwt.issuer=${JWT_ISSUER:reservation-auth}
reservation.security.jwt.expiration=${JWT_EXPIRATION:PT2H}

reservation.auth.admin.seed.enabled=${AUTH_ADMIN_SEED_ENABLED:false}
reservation.auth.admin.seed.email=${AUTH_ADMIN_EMAIL:admin@example.com}
reservation.auth.admin.seed.display-name=${AUTH_ADMIN_DISPLAY_NAME:Admin}
reservation.auth.admin.seed.password=${AUTH_ADMIN_PASSWORD:admin123}
