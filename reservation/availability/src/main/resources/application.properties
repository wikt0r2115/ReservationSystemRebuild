server.port=8081

spring.application.name=availability
spring.datasource.url=jdbc:h2:mem:availabilitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.h2.console.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

reservation.security.admin.username=${ADMIN_USERNAME:admin}
reservation.security.admin.password=${ADMIN_PASSWORD:admin123}
reservation.security.customer.username=${CUSTOMER_USERNAME:customer}
reservation.security.customer.password=${CUSTOMER_PASSWORD:customer123}
