spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/reservation}
spring.datasource.username=${DATABASE_USERNAME:reservation}
spring.datasource.password=${DATABASE_PASSWORD:reservation}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.table=offer_flyway_schema_history
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.h2.console.enabled=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
