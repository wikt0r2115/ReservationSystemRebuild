name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test full reactor
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reservation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            reservation/pom.xml
            reservation/security-common/pom.xml
            reservation/auth/pom.xml
            reservation/offer/pom.xml
            reservation/availability/pom.xml
            reservation/booking/pom.xml

      - name: Run tests
        run: mvn -B clean test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports
          path: reservation/**/target/surefire-reports
          if-no-files-found: ignore

  package:
    name: Package full reactor
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: reservation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            reservation/pom.xml
            reservation/security-common/pom.xml
            reservation/auth/pom.xml
            reservation/offer/pom.xml
            reservation/availability/pom.xml
            reservation/booking/pom.xml

      - name: Build package
        run: mvn -B -DskipTests package

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: service-jars
          path: reservation/*/target/*.jar
          if-no-files-found: error

  postgres-smoke:
    name: PostgreSQL smoke
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reservation
          POSTGRES_USER: reservation
          POSTGRES_PASSWORD: reservation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reservation -d reservation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: reservation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            reservation/pom.xml
            reservation/security-common/pom.xml
            reservation/auth/pom.xml
            reservation/offer/pom.xml
            reservation/availability/pom.xml
            reservation/booking/pom.xml

      - name: Build service jars
        run: mvn -B -DskipTests package

      - name: Run PostgreSQL smoke
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/reservation
          DATABASE_USERNAME: reservation
          DATABASE_PASSWORD: reservation
          JWT_SECRET: ci-postgres-smoke-secret
          JWT_ISSUER: reservation-auth
          JWT_EXPIRATION: PT2H
        run: bash ../.github/scripts/postgres-smoke.sh

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: postgres-smoke-logs
          path: ${{ github.workspace }}/.ci-postgres-smoke
          include-hidden-files: true
          if-no-files-found: ignore
